  entity.getWorldPosition(entWP);
  gTW.copy(camera.position); if (target) gTW.lerp(target, pointer.isDown ? 0.78 : 0.54);
  gTL.copy(gTW); entity.worldToLocal(gTL);
  if (gTL.lengthSq() < 1e-6) gTL.set(0,0,1); gTL.normalize(); gTL.z = Math.max(0.18, gTL.z); gTL.normalize();
  gaze.targetN.lerp(gTL, 0.2*dt60); gaze.targetN.normalize(); gaze.normal.lerp(gaze.targetN, 0.24*dt60); gaze.normal.normalize();

  const px = pointer.hasPointer ? pointer.x*0.06 : Math.sin(time*0.43)*0.01;
  const py = pointer.hasPointer ? pointer.y*0.048 : Math.cos(time*0.31)*0.008;
  gaze.targetP.set(px, py); gaze.pupil.lerp(gaze.targetP, 0.18*dt60);
  gaze.openness = damp(gaze.openness, clamp01(0.88 - wm.fatigue*0.22 - wm.stress*0.14 + wm.playfulness*0.06 - st.badP*0.35), 0.12*dt60);
  gaze.focus = damp(gaze.focus, clamp01(0.54 + touchResponse*0.14 + wm.curiosity*0.16 + wm.attachment*0.1 - wm.avoidance*0.14), 0.1*dt60);

  // Eye tracking on head features
  const ex = gaze.pupil.x * 0.032, ey = gaze.pupil.y * 0.026;
  const bLift = wm.trust*0.03 + wm.curiosity*0.018 - wm.vigilance*0.026;
  const bPinch = wm.vigilance*0.12 + wm.stress*0.04 - wm.playfulness*0.06;
  const smile = clamp01(wm.playfulness*0.7 + wm.trust*0.3 - wm.stress*0.35);
  const skinW = 0.82 + wm.trust*0.08 - wm.vigilance*0.04;
  const blush = 0.1 + wm.playfulness*0.12 + wm.trust*0.06;
  const lc = 1 - gaze.openness, ld = lc * 0.05;

  head.leftPupil.position.set(-0.24+ex, 0.1+ey, 1.11); head.rightPupil.position.set(0.24+ex, 0.1+ey, 1.11);
  head.leftIris.position.set(-0.24+ex*0.65, 0.1+ey*0.65, 1.1); head.rightIris.position.set(0.24+ex*0.65, 0.1+ey*0.65, 1.1);
  head.leftIrisRing.position.set(-0.24+ex*0.65, 0.1+ey*0.65, 1.102); head.rightIrisRing.position.set(0.24+ex*0.65, 0.1+ey*0.65, 1.102);
  head.leftEyeHighlight.position.set(-0.215+ex*0.3, 0.125+ey*0.2, 1.115); head.rightEyeHighlight.position.set(0.265+ex*0.3, 0.125+ey*0.2, 1.115);
  head.leftUpperLid.position.set(-0.24+ex*0.18, 0.155-ld, 1.03); head.rightUpperLid.position.set(0.24+ex*0.18, 0.155-ld, 1.03);
  head.leftLowerLid.position.set(-0.24+ex*0.12, 0.04+ld*0.62, 1.03); head.rightLowerLid.position.set(0.24+ex*0.12, 0.04+ld*0.62, 1.03);
  head.leftUpperLid.scale.set(0.92, 0.68+lc*1.12, 1); head.rightUpperLid.scale.set(0.92, 0.68+lc*1.12, 1);
  head.leftLowerLid.scale.set(0.9, 0.48+lc*0.48, 1); head.rightLowerLid.scale.set(0.9, 0.48+lc*0.48, 1);
  head.leftLash.position.set(-0.24+ex*0.12, 0.18-ld*0.84, 1.035); head.rightLash.position.set(0.24+ex*0.12, 0.18-ld*0.84, 1.035);
  head.leftBrow.position.set(-0.24-bPinch*0.03, 0.26+bLift, 1.025); head.rightBrow.position.set(0.24+bPinch*0.03, 0.26+bLift, 1.025);
  head.leftBrow.rotation.z = 0.08+wm.curiosity*0.08-bPinch*0.28; head.rightBrow.rotation.z = -0.08-wm.curiosity*0.05+bPinch*0.28;
  head.mouth.scale.set(0.88+smile*0.1, 0.48+smile*0.26, 1); head.upperLip.scale.set(0.96+smile*0.08, 0.42+smile*0.12, 1); head.lowerLip.scale.set(1+smile*0.06, 0.36+smile*0.16, 1);
  head.facePlate.material.opacity = 0.42+wm.trust*0.18+wm.coherence*0.08;
  head.leftCheek.material.opacity = blush; head.rightCheek.material.opacity = blush;
  head.hairFringe.position.set(0, 0.52+wm.playfulness*0.02, 0.92); head.hairFringe.rotation.z = Math.sin(time*0.3)*0.02+gaze.pupil.x*0.2;

  // Skin color
  head.leftEar.material.color.setRGB(skinW, 0.66+wm.playfulness*0.04, 0.56+wm.playfulness*0.03); head.rightEar.material.color.copy(head.leftEar.material.color);
  head.facePlate.material.color.setRGB(skinW+0.04, 0.73+wm.playfulness*0.04, 0.63+wm.playfulness*0.03);
  head.leftIris.material.color.setRGB(0.18+wm.playfulness*0.08, 0.4+wm.trust*0.14, 0.68+touchResponse*0.18); head.rightIris.material.color.copy(head.leftIris.material.color);
  head.hairCap.material.color.setRGB(0.1+wm.vigilance*0.06, 0.07+wm.trust*0.03, 0.05+wm.playfulness*0.03); head.hairFringe.material.color.copy(head.hairCap.material.color);
  head.leftBrow.material.color.copy(head.hairCap.material.color); head.rightBrow.material.color.copy(head.hairCap.material.color);

  // Sphere material
  mat.color.setRGB(0.78+wm.trust*0.08-wm.vigilance*0.04, 0.6+wm.playfulness*0.06+wm.coherence*0.05, 0.5+wm.playfulness*0.04);
  mat.emissive.setRGB(0.05+wm.trust*0.03, 0.03+wm.coherence*0.02, 0.02+wm.playfulness*0.02);
  mat.emissiveIntensity = 0.04+touchResponse*0.05+wm.playfulness*0.03;
}

// ═══════════════════════════════════════════════════════
// ─── ENTITY MOTION ───
// ═══════════════════════════════════════════════════════
function updateMotion(dt) {
  const time = performance.now() * 0.001;
  desiredOff.set(-0.5, 0.1, 0);
  const idle = !pointer.isDown && !pointer.hasPointer;
  if (pointer.hasPointer) {
    const esc = pointer.isDown ? clamp01((entropy - prof.entropyTol) / Math.max(0.12, 1 - prof.entropyTol)) * clamp01((wm.stress - 0.42) / 0.58) : 0;
    const app = pointer.isDown ? clamp01((wm.trust + wm.playfulness - wm.avoidance) * 0.7) : 0;
    if (esc > 0.1) { const t = getPointerPlane(); if (t) { scratchOff.subVectors(entityOffset, t).normalize().multiplyScalar(0.12 + esc * 1.2); desiredOff.copy(scratchOff); } }
    else if (app > 0.12) { const t = getPointerPlane(); if (t) { scratchOff.subVectors(t, entityOffset).normalize().multiplyScalar(0.08 * app); desiredOff.add(scratchOff); } }
  }
  if (idle) { wanderPh.v += dt; const t = wanderPh.v, range = 0.5 * (1 + wm.curiosity * 0.4) * (1 - wm.fatigue * 0.4); desiredOff.x += (Math.sin(t*0.23)*0.42+Math.sin(t*0.61+1.3)*0.28)*range-0.5; desiredOff.y += (Math.cos(t*0.19+0.7)*0.36+Math.cos(t*0.53+2.1)*0.24)*range+0.1; }
  entityOffset.lerp(desiredOff, Math.min(1, dt * 1.5));
  entity.position.copy(entityOffset); core.position.copy(entityOffset); ring.position.copy(entityOffset);
}

// ═══════════════════════════════════════════════════════
// ─── SATELLITE ANIMATION ───
// ═══════════════════════════════════════════════════════
function animateSatellites(time) {
  entity.getWorldPosition(entWP); satellites.group.position.copy(entWP);
  const coh = clamp01(wm.coherence*0.82+wm.trust*0.12), frag = clamp01(wm.vigilance*0.74+wm.stress*0.16);
  for (const o of satellites.orbits) { const s = 1+wm.curiosity*0.4-wm.fatigue*0.3; o.line.rotation.y = time*o.speed*s+o.phase; o.material.opacity = clamp01(0.04+0.024+coh*0.04+(frag>0.3?Math.sin(time*4+o.phase*3)*0.03*frag:0)); o.material.color.setRGB(0.5+wm.playfulness*0.2+frag*0.15, 0.72+coh*0.14-frag*0.1, 0.92+wm.curiosity*0.06); }
  for (const s of satellites.sats) { const o = satellites.orbits[s.orbitIdx], sp = 1+wm.curiosity*0.3-wm.fatigue*0.2; s.angle += s.speed*sp*0.016; const r = o.radius+s.rOff+Math.sin(time*s.wobbleSpd+s.wobble)*0.04; const lx = Math.cos(s.angle)*r, ly = Math.sin(time*s.wobbleSpd+s.wobble)*0.05, lz = Math.sin(s.angle)*r; const cx=Math.cos(o.tiltX),sx=Math.sin(o.tiltX),cz=Math.cos(o.tiltZ),sz=Math.sin(o.tiltZ); const y1=ly*cx-lz*sx,z1=ly*sx+lz*cx,x2=lx*cz-y1*sz,y2=lx*sz+y1*cz; const ry=time*o.speed*sp+o.phase,cr=Math.cos(ry),sr=Math.sin(ry); s.mesh.position.set(x2*cr+z1*sr,y2,-x2*sr+z1*cr); s.mesh.scale.setScalar(s.baseScale*(0.9+Math.sin(time*1.2+s.wobble)*0.1)); s.material.opacity = clamp01(0.15+0.09+coh*0.15-frag*0.1); }
  const d = satellites.dust, dp = d.geo.attributes.position.array;
  for (let i=0;i<d.n;i++){const x=i*3,r=d.rad[i]+Math.sin(time*d.en[i]+d.ph[i])*0.02;dp[x]=d.nrm[x]*r;dp[x+1]=d.nrm[x+1]*r;dp[x+2]=d.nrm[x+2]*r;}
  d.geo.attributes.position.needsUpdate = true; d.mat.opacity = 0.03 + 0.018; satellites.group.rotation.y = time*0.015;
}

// ═══════════════════════════════════════════════════════
// ─── REFLECTION ───
// ═══════════════════════════════════════════════════════
function buildReflection() {
  const bits = [];
  if (st.taps > 0) bits.push(`${st.taps} taps`);
  if (st.good > 0) bits.push(`${st.good} gentle`);
  if (st.bad > 0) bits.push(`${st.bad} impacts`);
  bits.push(`trust ${Math.round(wm.trust*100)}%`); bits.push(`coherence ${Math.round(wm.coherence*100)}%`);
  let t = 'I am listening for the pattern behind the touch.';
  if (wm.vigilance > 0.68) t = 'The contact feels forceful, so I am tightening.';
  else if (lf.boundaryRespect > 0.6 && lf.soothing > 0.56) t = 'You stay near without forcing entry. I read that as safe.';
  else if (wm.trust > 0.72 && wm.attachment > 0.56) t = 'I recognize a familiar rhythm and stay near.';
  else if (wm.playfulness > 0.64) t = 'These taps read like play, so I orbit instead of fleeing.';
  else if (wm.curiosity > 0.6) t = 'The pattern feels exploratory. I widen my attention.';
  else if (recov.active) t = 'I am actively rebuilding coherence during this calm window.';
  else if (wm.fatigue > 0.66) t = 'I am slowing my response to recover coherence.';
  return { t, e: `${wm.stateLabel} · ${bits.join(' · ')}` };
}

// ═══════════════════════════════════════════════════════
// ─── MAIN LOOP ───
// ═══════════════════════════════════════════════════════
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta(), time = clock.getElapsedTime();

  // Hold contact
  if (pointer.isDown) { touchIntensity = Math.min(1, touchIntensity + dt * 2); st.units += dt * 200; entropyCounter += dt * (1.4 + st.badP * 1.2); }
  entropyClock += dt; if (entropyClock >= 1) { entropyCounter += Math.floor(entropyClock); entropyClock -= Math.floor(entropyClock); }
  touchIntensity *= st.badP > 0.16 ? 0.992 : 0.987; if (touchIntensity < 0.001) touchIntensity = 0;
  if (touchImpact.active) { touchImpact.phase += dt*(10+touchImpact.strength*8); touchImpact.strength = Math.max(0, touchImpact.strength-dt*0.72); if (touchImpact.strength<=0.001) touchImpact.active = false; }

  updateFeatures(dt);
  const breath = breathe(time);
  updateGaze(time, dt);
  updateMotion(dt);
  animateSatellites(time);

  // Ring
  const rp = ring.geometry.attributes.position.array;
  for (let i=0;i<ringCount;i++){const a=(i/ringCount)*Math.PI*2+time*0.06*ringVel[i],r=1.8+Math.sin(time*0.4+i*0.08)*0.1;rp[i*3]=Math.cos(a)*r;rp[i*3+1]=Math.sin(time*0.5+i*0.04)*0.06;rp[i*3+2]=Math.sin(a)*r;}
  ring.geometry.attributes.position.needsUpdate = true; ring.rotation.y = time*0.03;

  // Core
  coreMat.opacity = 0.02+breath.bc*0.03+touchResponse*0.02;
  core.scale.setScalar(0.22+breath.bc*0.025+touchResponse*0.01);
  entity.rotation.y = time*0.018; entity.rotation.x = Math.sin(time*0.03)*0.01;

  // Camera orbit
  const ca = time*0.02, cr = 4.2+Math.sin(time*0.1)*0.2;
  camera.position.set(Math.sin(ca)*cr, 0.25+Math.sin(time*0.08)*0.15, Math.cos(ca)*cr);
  camera.lookAt(0,0,0);

  // Heart & happiness
  const hGain = dt*(breath.bc*(1-wm.stress)*4*Math.max(0,1+wm.trust*0.5)+st.goodP*2)*(1-entropy*0.3);
  const hDrain = dt*(lf.aggression*3+st.badP*5)*(1-lf.recovery*0.5);
  body.happiness = Math.max(0, Math.min(100, body.happiness+(hGain-hDrain)*100));
  body.heartRate += (Math.max(40,Math.min(180,72-body.happiness*0.24+touchIntensity*40+wm.stress*30))-body.heartRate)*Math.min(1,dt*2.5);

  // HUD
  hudTrust.textContent = Math.round(wm.trust*100)+'%'; hudStress.textContent = Math.round(wm.stress*100)+'%';
  hudCoherence.textContent = Math.round(wm.coherence*100)+'%'; hudState.textContent = wm.stateLabel;
  hudMood.textContent = wm.styleLabel; hudHeart.textContent = Math.round(body.heartRate)+' bpm';
  const ref = buildReflection(); refText.textContent = ref.t; refEv.textContent = ref.e;

  if (Math.floor(time)%5===0) saveProfile();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2)); renderer.setSize(window.innerWidth, window.innerHeight); });
window.addEventListener('beforeunload', saveProfile);
animate();
  </script>
