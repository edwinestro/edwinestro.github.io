<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protein Interactions — Molecular Dynamics</title>
  <meta name="description" content="Protein Interactions is a playable 3D molecular dynamics demo where antibodies, antigens, enzymes, DNA, and membranes dock in real time." />
  <meta name="theme-color" content="#080c14" />
  <meta property="og:title" content="Protein Interactions — Molecular Dynamics" />
  <meta property="og:description" content="Playable 3D molecular interaction scenes: antibody docking, drug binding, ion channels, ATP motors, and more." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://edwinestro.github.io/Projects/games/protein-interactions/index.html" />
  <meta property="og:image" content="https://edwinestro.github.io/Projects/hubs/science-lab/assets/protein-interactions-1600x900.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Protein Interactions — Molecular Dynamics" />
  <meta name="twitter:description" content="Playable 3D molecular interaction scenes: antibody docking, drug binding, ion channels, ATP motors, and more." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Loading -->
  <div id="loading" class="loading-overlay">
    <div class="loading-spinner"></div>
    <span>Initializing molecular dynamics…</span>
  </div>

  <!-- Info Panel -->
  <div id="info-panel" class="panel">
    <h2>Protein Interactions</h2>
    <div class="control-row">
      <label for="scene-select">Scenario</label>
      <select id="scene-select"></select>
    </div>
    <div class="info-row"><span class="label">Molecule A</span><span id="info-mol-a">—</span></div>
    <div class="info-row"><span class="label">Molecule B</span><span id="info-mol-b">—</span></div>
    <div class="info-row"><span class="label">Total Atoms</span><span id="info-atoms">—</span></div>
    <div class="info-row"><span class="label">State</span><span id="info-state" class="state-badge">Approaching</span></div>
    <p id="info-description" class="info-desc"></p>
  </div>

  <!-- Tooltip -->
  <div id="tooltip" class="tooltip is-hidden"></div>

  <!-- Controls Panel -->
  <div id="controls-panel" class="panel">
    <h3>Controls</h3>

    <div class="control-row">
      <label for="speed-slider">Sim Speed</label>
      <input id="speed-slider" type="range" min="0.1" max="3.0" step="0.1" value="1.0" />
    </div>

    <div class="control-row">
      <label for="bond-toggle">Show Bonds</label>
      <input id="bond-toggle" type="checkbox" checked />
    </div>

    <div class="control-row">
      <label for="forces-toggle">Show Forces</label>
      <input id="forces-toggle" type="checkbox" checked />
    </div>

    <div class="control-row">
      <label for="labels-toggle">Show Labels</label>
      <input id="labels-toggle" type="checkbox" checked />
    </div>

    <div class="control-row">
      <label for="spin-toggle">Auto-Spin</label>
      <input id="spin-toggle" type="checkbox" />
    </div>

    <div class="control-row">
      <label for="bloom-toggle">Glow Effect</label>
      <input id="bloom-toggle" type="checkbox" checked />
    </div>

    <div class="btn-row">
      <button id="play-btn" class="btn-action btn-info">▶ Play</button>
      <button id="reset-btn" class="btn-action">↺ Reset</button>
    </div>
    <div class="btn-row">
      <button id="screenshot-btn" class="btn-action btn-accent">📷 Screenshot</button>
    </div>
  </div>

  <!-- Legend -->
  <div id="legend" class="panel">
    <h3>Molecules</h3>
    <div id="legend-items"></div>
    <div class="legend-divider"></div>
    <h3>Shortcuts</h3>
    <div class="legend-row"><kbd>Space</kbd> Play / Pause</div>
    <div class="legend-row"><kbd>R</kbd> Reset simulation</div>
    <div class="legend-row"><kbd>S</kbd> Toggle spin</div>
    <div class="legend-row"><kbd>F</kbd> Show forces</div>
    <div class="legend-row"><kbd>←→</kbd> Prev / Next scene</div>
    <div class="legend-row"><kbd>P</kbd> Screenshot</div>
  </div>

  <!-- FPS -->
  <div id="fps-counter" class="fps-badge">-- fps</div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <div class="home-link-wrap"><a class="home-link" href="../../../index.html">← Back to portal</a></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
