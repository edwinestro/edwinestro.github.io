<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AGI 3D</title>
  <meta name="description" content="Watch an AGI entity breathe and pulse in real-time 3D. A living liquid-metal intelligence suspended in space." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #020408; }
    canvas { display: block; width: 100vw; height: 100vh; }

    .hud {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 18px;
      align-items: center;
      padding: 10px 22px;
      border-radius: 999px;
      background: rgba(6, 12, 24, 0.72);
      border: 1px solid rgba(108, 232, 255, 0.14);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-family: "Segoe UI", system-ui, sans-serif;
      color: rgba(220, 240, 255, 0.88);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      pointer-events: none;
      z-index: 10;
    }
    .hud span { white-space: nowrap; }
    .hud .tag { color: rgba(108, 232, 255, 0.92); }

    .title-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 22px 28px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }
    .title-bar h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 700;
      color: rgba(235, 245, 255, 0.94);
      text-shadow: 0 8px 30px rgba(0,0,0,0.4);
      margin: 0;
    }
    .title-bar p {
      margin: 6px 0 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 0.88rem;
      color: rgba(180, 210, 240, 0.68);
    }
    .title-bar a {
      pointer-events: auto;
      color: rgba(108, 232, 255, 0.82);
      text-decoration: none;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid rgba(108, 232, 255, 0.18);
      background: rgba(6, 12, 24, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: border-color 0.2s, background 0.2s;
    }
    .title-bar a:hover { border-color: rgba(108, 232, 255, 0.4); background: rgba(108, 232, 255, 0.08); }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="title-bar">
    <div>
      <h1>AGI 3D</h1>
      <p>A living intelligence, breathing in space</p>
    </div>
    <a href="../../../index.html">← Portal</a>
  </div>

  <div class="hud">
    <span class="tag">PULSE</span>
    <span id="hudPulse">0.00</span>
    <span class="tag">BREATH</span>
    <span id="hudBreath">0.00</span>
    <span class="tag">ENTROPY</span>
    <span id="hudEntropy">0.00</span>
  </div>

  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
  </script>
  <script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('c');
const hudPulse = document.getElementById('hudPulse');
const hudBreath = document.getElementById('hudBreath');
const hudEntropy = document.getElementById('hudEntropy');

// ─── Renderer ───
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace = THREE.SRGBColorSpace;

// ─── Scene ───
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020610, 0.06);

// Skybox gradient
const skyGeo = new THREE.SphereGeometry(50, 32, 32);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    colorTop: { value: new THREE.Color(0x0a1a30) },
    colorBot: { value: new THREE.Color(0x020408) },
  },
  vertexShader: `
    varying vec3 vWorldPos;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform vec3 colorTop;
    uniform vec3 colorBot;
    varying vec3 vWorldPos;
    void main() {
      float h = normalize(vWorldPos).y * 0.5 + 0.5;
      gl_FragColor = vec4(mix(colorBot, colorTop, h), 1.0);
    }
  `,
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// ─── Camera ───
const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.3, 4.2);
camera.lookAt(0, 0, 0);

// ─── AGI Entity ───
const geo = new THREE.IcosahedronGeometry(1, 6);
const basePositions = new Float32Array(geo.attributes.position.array);

const mat = new THREE.MeshPhysicalMaterial({
  color: new THREE.Color(0.18, 0.72, 1.0),
  metalness: 0.88,
  roughness: 0.08,
  clearcoat: 1.0,
  clearcoatRoughness: 0.05,
  transmission: 0.12,
  thickness: 0.8,
  ior: 1.45,
  envMapIntensity: 2.2,
  emissive: new THREE.Color(0x0a2244),
  emissiveIntensity: 0.2,
  sheen: 0.4,
  sheenColor: new THREE.Color(0x4488ff),
  sheenRoughness: 0.3,
});

const entity = new THREE.Mesh(geo, mat);
scene.add(entity);

// ─── Inner glow core ───
const coreGeo = new THREE.IcosahedronGeometry(0.35, 4);
const coreMat = new THREE.MeshBasicMaterial({
  color: 0x6ce8ff,
  transparent: true,
  opacity: 0.12,
});
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// ─── Particle ring ───
const ringCount = 360;
const ringGeo2 = new THREE.BufferGeometry();
const ringPos = new Float32Array(ringCount * 3);
const ringVel = new Float32Array(ringCount);
for (let i = 0; i < ringCount; i++) {
  const a = (i / ringCount) * Math.PI * 2;
  const r = 1.8 + Math.random() * 0.5;
  ringPos[i * 3] = Math.cos(a) * r;
  ringPos[i * 3 + 1] = (Math.random() - 0.5) * 0.12;
  ringPos[i * 3 + 2] = Math.sin(a) * r;
  ringVel[i] = 0.3 + Math.random() * 0.7;
}
ringGeo2.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
const ringMat = new THREE.PointsMaterial({
  color: 0x7ff0c5,
  size: 0.025,
  transparent: true,
  opacity: 0.65,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const ring = new THREE.Points(ringGeo2, ringMat);
scene.add(ring);

// ─── Floating dust motes ───
const dustCount = 600;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
  dustPos[i * 3] = (Math.random() - 0.5) * 16;
  dustPos[i * 3 + 1] = (Math.random() - 0.5) * 10;
  dustPos[i * 3 + 2] = (Math.random() - 0.5) * 16;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.PointsMaterial({
  color: 0x4466aa,
  size: 0.015,
  transparent: true,
  opacity: 0.35,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
scene.add(new THREE.Points(dustGeo, dustMat));

// ─── Lighting ───
const key = new THREE.DirectionalLight(0xffffff, 2.0);
key.position.set(4, 5, 6);
scene.add(key);

const rim = new THREE.DirectionalLight(0x6ce8ff, 1.4);
rim.position.set(-4, 2, -5);
scene.add(rim);

const bottom = new THREE.PointLight(0xff7bc1, 0.9, 10);
bottom.position.set(0, -4, 2);
scene.add(bottom);

const fill = new THREE.PointLight(0x7ff0c5, 0.5, 8);
fill.position.set(3, -1, -3);
scene.add(fill);

scene.add(new THREE.AmbientLight(0x1a2a44, 0.5));

// ─── Animation ───
const clock = new THREE.Clock();

function breathe(time) {
  const pos = geo.attributes.position.array;

  // Breathing: slow global scale pulse
  const breathCycle = Math.sin(time * 0.6) * 0.5 + 0.5; // 0→1
  const breathScale = 0.97 + breathCycle * 0.06;

  // Pulse: faster ripple
  const pulseCycle = Math.sin(time * 2.2) * 0.5 + 0.5;
  const pulseAmp = 0.015 + pulseCycle * 0.025;

  // Entropy: chaotic high-frequency wobble
  const entropy = Math.sin(time * 0.13) * 0.5 + 0.5;
  const chaosAmp = 0.02 + entropy * 0.04;

  for (let i = 0; i < pos.length; i += 3) {
    const bx = basePositions[i], by = basePositions[i + 1], bz = basePositions[i + 2];
    const len = Math.sqrt(bx * bx + by * by + bz * bz);
    const nx = bx / len, ny = by / len, nz = bz / len;

    // Organic multi-layer displacement
    let d = 0;

    // Layer 1: slow ocean-like swell
    d += Math.sin(nx * 3.0 + time * 0.5) *
         Math.cos(ny * 2.8 + time * 0.4) *
         Math.sin(nz * 2.5 + time * 0.35) * 0.06 * breathScale;

    // Layer 2: pulse ripple
    d += Math.sin(nx * 5.5 + time * 2.0) *
         Math.cos(ny * 4.8 + time * 1.6) *
         pulseAmp;

    // Layer 3: chaotic micro-wobble
    d += Math.sin(nx * 9.0 + time * 3.5 + ny * 7.0) *
         Math.cos(nz * 8.0 + time * 2.8 + nx * 6.0) *
         chaosAmp;

    // Layer 4: very slow gravitational pull downward
    d += ny * Math.sin(time * 0.3) * 0.02;

    const s = breathScale;
    pos[i] = bx * s + nx * d;
    pos[i + 1] = by * s + ny * d;
    pos[i + 2] = bz * s + nz * d;
  }

  geo.attributes.position.needsUpdate = true;
  geo.computeVertexNormals();

  return { breathCycle, pulseCycle, entropy };
}

function updateMaterial(time, breath) {
  // Subtle color breathing
  const r = 0.16 + Math.sin(time * 0.4) * 0.04;
  const g = 0.68 + Math.sin(time * 0.3 + 1.0) * 0.06;
  const b = 0.96 + Math.sin(time * 0.5 + 2.0) * 0.04;
  mat.color.setRGB(r, g, b);

  // Emissive pulses with breath
  const ei = 0.12 + breath.pulseCycle * 0.18;
  mat.emissiveIntensity = ei;
  mat.emissive.setRGB(0.04 + breath.pulseCycle * 0.08, 0.12 + breath.breathCycle * 0.06, 0.28 + breath.pulseCycle * 0.12);

  // Core glow follows breath
  coreMat.opacity = 0.06 + breath.breathCycle * 0.12 + breath.pulseCycle * 0.06;
  core.scale.setScalar(0.3 + breath.breathCycle * 0.12);
}

function animateRing(time) {
  const pos = ring.geometry.attributes.position.array;
  for (let i = 0; i < ringCount; i++) {
    const a = (i / ringCount) * Math.PI * 2 + time * 0.08 * ringVel[i];
    const r = 1.8 + Math.sin(time * 0.5 + i * 0.1) * 0.15;
    pos[i * 3] = Math.cos(a) * r;
    pos[i * 3 + 1] = Math.sin(time * 0.7 + i * 0.05) * 0.08;
    pos[i * 3 + 2] = Math.sin(a) * r;
  }
  ring.geometry.attributes.position.needsUpdate = true;
  ring.rotation.y = time * 0.04;
}

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();

  const breath = breathe(time);
  updateMaterial(time, breath);
  animateRing(time);

  // Gentle entity rotation
  entity.rotation.y = time * 0.08;
  entity.rotation.x = Math.sin(time * 0.05) * 0.06;

  // Camera gentle orbit
  const camAngle = time * 0.03;
  const camR = 4.2 + Math.sin(time * 0.15) * 0.3;
  camera.position.x = Math.sin(camAngle) * camR;
  camera.position.z = Math.cos(camAngle) * camR;
  camera.position.y = 0.3 + Math.sin(time * 0.12) * 0.25;
  camera.lookAt(0, 0, 0);

  // HUD
  hudPulse.textContent = breath.pulseCycle.toFixed(2);
  hudBreath.textContent = breath.breathCycle.toFixed(2);
  hudEntropy.textContent = breath.entropy.toFixed(2);

  renderer.render(scene, camera);
}

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
  </script>
</body>
</html>
