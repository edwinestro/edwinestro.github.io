<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Onlyfied</title>
  <desc id="desc">A polished thumbnail for the Onlyfied meta crossover strategy game, showing repo insights flowing into a playable release board.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#091b17"/>
      <stop offset="100%" stop-color="#040b09"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11352d"/>
      <stop offset="100%" stop-color="#0a1a17"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ce1c2"/>
      <stop offset="100%" stop-color="#8fd5ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020706" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1240" cy="190" r="96" fill="#4ce1c2" opacity="0.12"/>
  <circle cx="1360" cy="160" r="54" fill="#8fd5ff" opacity="0.18"/>

  <rect x="84" y="84" width="1432" height="732" rx="42" fill="url(#panel)" stroke="#245d51" stroke-width="3"/>

  <g opacity="0.92">
    <text x="140" y="178" fill="#edfdf9" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="700">Onlyfied</text>
    <text x="142" y="218" fill="#8fd5ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" letter-spacing="3">META CROSSOVER STRATEGY RUN</text>
    <text x="142" y="270" fill="#9dd3c6" font-family="Segoe UI, Arial, sans-serif" font-size="24">Ship hype, clarity, trust, and momentum using signals pulled from the repo.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="138" y="326" width="420" height="362" rx="28" fill="#0b1b18" stroke="#2d7363"/>
    <text x="174" y="378" fill="#edfdf9" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Source feed</text>
    <rect x="172" y="412" width="350" height="54" rx="18" fill="#143129" stroke="#2d7363"/>
    <rect x="172" y="486" width="350" height="54" rx="18" fill="#143129" stroke="#2d7363"/>
    <rect x="172" y="560" width="350" height="54" rx="18" fill="#143129" stroke="#2d7363"/>
    <text x="194" y="446" fill="#edfdf9" font-family="Segoe UI, Arial, sans-serif" font-size="22">AGI 3D → visual spectacle</text>
    <text x="194" y="520" fill="#edfdf9" font-family="Segoe UI, Arial, sans-serif" font-size="22">Science Lab → guided curiosity</text>
    <text x="194" y="594" fill="#edfdf9" font-family="Segoe UI, Arial, sans-serif" font-size="22">Frost Signal → fast restart loop</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="624" y="326" width="838" height="362" rx="28" fill="#0b1b18" stroke="#2d7363"/>
    <text x="662" y="378" fill="#edfdf9" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Release board</text>

    <text x="664" y="430" fill="#9dd3c6" font-family="Segoe UI, Arial, sans-serif" font-size="20">Hype</text>
    <rect x="664" y="444" width="256" height="20" rx="10" fill="#102722"/>
    <rect x="664" y="444" width="192" height="20" rx="10" fill="url(#mint)"/>

    <text x="664" y="510" fill="#9dd3c6" font-family="Segoe UI, Arial, sans-serif" font-size="20">Clarity</text>
    <rect x="664" y="524" width="256" height="20" rx="10" fill="#102722"/>
    <rect x="664" y="524" width="214" height="20" rx="10" fill="#7adfbe"/>

    <text x="664" y="590" fill="#9dd3c6" font-family="Segoe UI, Arial, sans-serif" font-size="20">Trust</text>
    <rect x="664" y="604" width="256" height="20" rx="10" fill="#102722"/>
    <rect x="664" y="604" width="184" height="20" rx="10" fill="#8fd5ff"/>

    <rect x="998" y="424" width="392" height="184" rx="24" fill="#112a24" stroke="#2d7363"/>
    <text x="1030" y="466" fill="#edfdf9" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Choose your move</text>
    <rect x="1030" y="492" width="146" height="38" rx="14" fill="#4ce1c2"/>
    <rect x="1192" y="492" width="156" height="38" rx="14" fill="#173b33" stroke="#2d7363"/>
    <rect x="1030" y="546" width="146" height="38" rx="14" fill="#173b33" stroke="#2d7363"/>
    <rect x="1192" y="546" width="156" height="38" rx="14" fill="#173b33" stroke="#2d7363"/>
    <text x="1060" y="517" fill="#04221b" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Amplify</text>
    <text x="1225" y="517" fill="#edfdf9" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Prototype</text>
    <text x="1060" y="571" fill="#edfdf9" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Stabilize</text>
    <text x="1225" y="571" fill="#edfdf9" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Recover</text>
  </g>
</svg>