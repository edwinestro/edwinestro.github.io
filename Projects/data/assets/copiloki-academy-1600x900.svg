<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Copiloki Academy</title>
  <desc id="desc">A polished thumbnail showing Copiloki training in an academy simulator with skill meters and a glowing practice arena.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#13264c"/>
      <stop offset="100%" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d355f"/>
      <stop offset="100%" stop-color="#10203c"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8ce8ff"/>
      <stop offset="100%" stop-color="#8ef5c9"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9d4"/>
      <stop offset="60%" stop-color="#f1dc95"/>
      <stop offset="100%" stop-color="rgba(241,220,149,0)"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#04101d" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1220" cy="170" r="80" fill="url(#orb)"/>
  <rect x="90" y="90" width="1420" height="720" rx="44" fill="url(#panel)" stroke="#36558a" stroke-width="3"/>

  <g opacity="0.8">
