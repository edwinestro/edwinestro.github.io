      <rect x="0" y="18" width="240" height="22" rx="11" fill="#102642"/>
      <rect x="0" y="18" width="170" height="22" rx="11" fill="url(#mint)"/>

      <text x="0" y="92" fill="#a8bdd6" font-family="Segoe UI, Arial, sans-serif" font-size="20">Autonomy</text>
      <rect x="0" y="110" width="240" height="22" rx="11" fill="#102642"/>
      <rect x="0" y="110" width="190" height="22" rx="11" fill="#ffd27d"/>

      <text x="0" y="184" fill="#a8bdd6" font-family="Segoe UI, Arial, sans-serif" font-size="20">Variety reward</text>
      <rect x="0" y="202" width="240" height="22" rx="11" fill="#102642"/>
      <rect x="0" y="202" width="210" height="22" rx="11" fill="#9f8dff"/>
    </g>

    <g transform="translate(1008 378)">
      <rect x="0" y="0" width="356" height="250" rx="24" fill="#11233d" stroke="#2d4f81"/>
      <text x="26" y="40" fill="#eef6ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Watch Copiloki train</text>
      <circle cx="88" cy="140" r="26" fill="#8ce8ff"/>
      <circle cx="172" cy="102" r="22" fill="#8ef5c9"/>
      <rect x="230" y="132" width="62" height="34" rx="10" fill="#ffd27d"/>
      <path d="M88 140 Q122 98 172 102" fill="none" stroke="#eef6ff" stroke-width="5" opacity="0.75"/>
      <path d="M172 102 Q208 118 244 149" fill="none" stroke="#eef6ff" stroke-width="5" opacity="0.75"/>
      <text x="26" y="212" fill="#a8bdd6" font-family="Segoe UI, Arial, sans-serif" font-size="20">Bug Hunt • Memory Lights • Patch Dash</text>
