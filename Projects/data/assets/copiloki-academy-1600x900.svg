    <text x="176" y="225" fill="#8ce8ff" font-family="Segoe UI, Arial, sans-serif" font-size="18" letter-spacing="2">AUTONOMOUS PET TRAINING SIM</text>
  </g>

  <g>
    <rect x="140" y="286" width="410" height="410" rx="34" fill="#0d1830" stroke="#274a7a"/>
    <rect x="170" y="582" width="350" height="80" rx="24" fill="#335d4d"/>
    <ellipse cx="344" cy="592" rx="108" ry="24" fill="#143125" opacity="0.45"/>

    <ellipse cx="350" cy="524" rx="132" ry="116" fill="#f3fbff" filter="url(#shadow)"/>
    <ellipse cx="274" cy="432" rx="36" ry="80" transform="rotate(-20 274 432)" fill="#edf8ff"/>
    <ellipse cx="425" cy="428" rx="36" ry="80" transform="rotate(18 425 428)" fill="#edf8ff"/>
    <ellipse cx="274" cy="441" rx="22" ry="58" transform="rotate(-20 274 441)" fill="#ffdbe4" opacity="0.7"/>
    <ellipse cx="425" cy="437" rx="22" ry="58" transform="rotate(18 425 437)" fill="#ffdbe4" opacity="0.7"/>
    <ellipse cx="308" cy="621" rx="38" ry="24" fill="#e6f5ff"/>
    <ellipse cx="392" cy="621" rx="38" ry="24" fill="#e6f5ff"/>
    <rect x="300" y="470" width="30" height="16" rx="8" fill="#203547"/>
    <rect x="370" y="470" width="30" height="16" rx="8" fill="#203547"/>
    <path d="M332 540 Q350 560 368 540" fill="none" stroke="#537588" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="286" cy="520" rx="22" ry="14" fill="#ffb6c8" opacity="0.6"/>
    <ellipse cx="414" cy="520" rx="22" ry="14" fill="#ffb6c8" opacity="0.6"/>
    <rect x="182" y="160" width="130" height="48" rx="20" fill="#544b3a" opacity="0.88"/>
    <text x="205" y="192" fill="#fff0ca" font-family="Consolas, monospace" font-size="26" font-weight="700">Prime</text>
  </g>

  <g>
    <rect x="622" y="286" width="828" height="410" rx="34" fill="#0b1830" stroke="#274a7a"/>
    <text x="666" y="340" fill="#eef6ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Academy Systems</text>

    <g transform="translate(666 390)">
