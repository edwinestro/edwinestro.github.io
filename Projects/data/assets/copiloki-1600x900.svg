<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Copiloki cover art</title>
  <desc id="desc">A neon tamagotchi-style pet named Copiloki glowing inside a futuristic handheld screen.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09111f"/>
      <stop offset="55%" stop-color="#10203e"/>
      <stop offset="100%" stop-color="#060a13"/>
    </linearGradient>
    <linearGradient id="shell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#163359"/>
      <stop offset="100%" stop-color="#0d182d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74eaff"/>
      <stop offset="100%" stop-color="#8af0c2"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1210" cy="140" r="170" fill="#74eaff" opacity=".08"/>
  <circle cx="260" cy="760" r="220" fill="#9b8cff" opacity=".12"/>

  <rect x="250" y="120" width="1100" height="660" rx="48" fill="url(#shell)" stroke="#74eaff" stroke-opacity=".18"/>
  <rect x="330" y="190" width="940" height="520" rx="34" fill="#0a1222" stroke="#74eaff" stroke-opacity=".16"/>

  <circle cx="800" cy="445" r="170" fill="#74eaff" opacity=".1" filter="url(#glow)"/>
  <ellipse cx="800" cy="455" rx="160" ry="150" fill="#102a46"/>
  <ellipse cx="680" cy="315" rx="54" ry="70" fill="#9b8cff" opacity=".55" transform="rotate(-28 680 315)"/>
  <ellipse cx="920" cy="315" rx="54" ry="70" fill="#9b8cff" opacity=".55" transform="rotate(28 920 315)"/>
  <ellipse cx="800" cy="455" rx="128" ry="118" fill="url(#accent)" opacity=".22"/>

  <text x="800" y="470" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="92" font-weight="700" fill="#eef6ff">( ^_^ )</text>

  <text x="380" y="300" font-family="Segoe UI, sans-serif" font-size="28" font-weight="700" letter-spacing="8" fill="#74eaff">POCKET AI PET</text>
  <text x="380" y="380" font-family="Segoe UI, sans-serif" font-size="92" font-weight="800" fill="#eef6ff">COPILOKI</text>
  <text x="380" y="440" font-family="Segoe UI, sans-serif" font-size="30" fill="#a8bdd6">Feed it. Clean it. Nap it. Ship tiny patches.</text>

  <rect x="380" y="520" width="190" height="54" rx="27" fill="#74eaff" fill-opacity=".16" stroke="#74eaff" stroke-opacity=".24"/>
  <text x="475" y="555" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#eef6ff">Tamagotchi</text>

  <rect x="590" y="520" width="140" height="54" rx="27" fill="#8af0c2" fill-opacity=".14" stroke="#8af0c2" stroke-opacity=".24"/>
  <text x="660" y="555" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#eef6ff">Cozy Sim</text>

  <rect x="750" y="520" width="150" height="54" rx="27" fill="#9b8cff" fill-opacity=".16" stroke="#9b8cff" stroke-opacity=".24"/>
  <text x="825" y="555" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#eef6ff">New</text>
</svg>
