  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #020408; cursor: pointer; }
    canvas { display: block; width: 100vw; height: 100vh; }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;

      font-family: "Segoe UI", system-ui, sans-serif;

    .brand-mark {
      width: 40px; height: 40px; border-radius: 12px; object-fit: cover;

<body>
  <canvas id="c"></canvas>

  <div class="overlay" id="overlay">
    <div class="top-bar">
      <div class="brand">
        <img class="brand-mark" src="assets/img/edw.jpg" alt="Edwin Estro" />
        <div>

        <a href="Projects/games/unsupervised-3d/index.html">Unsupervised 3D</a>

      </nav>
    </div>
    <div class="bottom-bar">
      <div class="hint">Click anywhere to enter fullscreen</div>
      <div class="hud">
        <span class="tag">PULSE</span><span id="hudPulse">0.00</span>
        <span class="tag">BREATH</span><span id="hudBreath">0.00</span>
        <span class="tag">ENTROPY</span><span id="hudEntropy">0.00</span>
      </div>

  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
  </script>
  <script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('c');
const overlayEl = document.getElementById('overlay');
const hudPulse = document.getElementById('hudPulse');
const hudBreath = document.getElementById('hudBreath');
const hudEntropy = document.getElementById('hudEntropy');

// ─── Renderer ───
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace = THREE.SRGBColorSpace;

// ─── Scene ───
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020610, 0.06);

const skyGeo = new THREE.SphereGeometry(50, 32, 32);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    colorTop: { value: new THREE.Color(0x0a1a30) },
    colorBot: { value: new THREE.Color(0x020408) },
  },
  vertexShader: `
    varying vec3 vWorldPos;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform vec3 colorTop;
    uniform vec3 colorBot;
    varying vec3 vWorldPos;
    void main() {
      float h = normalize(vWorldPos).y * 0.5 + 0.5;
      gl_FragColor = vec4(mix(colorBot, colorTop, h), 1.0);
    }
  `,
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// ─── Camera ───
const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.3, 4.2);
camera.lookAt(0, 0, 0);

// ─── AGI Entity ───
const geo = new THREE.IcosahedronGeometry(1, 6);
const basePositions = new Float32Array(geo.attributes.position.array);

const mat = new THREE.MeshPhysicalMaterial({
  color: new THREE.Color(0.18, 0.72, 1.0),
  metalness: 0.88,
  roughness: 0.08,
  clearcoat: 1.0,
  clearcoatRoughness: 0.05,
  transmission: 0.12,
  thickness: 0.8,
  ior: 1.45,
  envMapIntensity: 2.2,
  emissive: new THREE.Color(0x0a2244),
  emissiveIntensity: 0.2,
  sheen: 0.4,
  sheenColor: new THREE.Color(0x4488ff),
  sheenRoughness: 0.3,
});

const entity = new THREE.Mesh(geo, mat);
scene.add(entity);

// Inner core
const coreGeo = new THREE.IcosahedronGeometry(0.35, 4);
const coreMat = new THREE.MeshBasicMaterial({ color: 0x6ce8ff, transparent: true, opacity: 0.12 });
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// Particle ring
const ringCount = 360;
const ringGeo2 = new THREE.BufferGeometry();
const ringPos = new Float32Array(ringCount * 3);
const ringVel = new Float32Array(ringCount);
for (let i = 0; i < ringCount; i++) {
  const a = (i / ringCount) * Math.PI * 2;
  const r = 1.8 + Math.random() * 0.5;
  ringPos[i * 3] = Math.cos(a) * r;
  ringPos[i * 3 + 1] = (Math.random() - 0.5) * 0.12;
  ringPos[i * 3 + 2] = Math.sin(a) * r;
  ringVel[i] = 0.3 + Math.random() * 0.7;
}
ringGeo2.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
const ringMat = new THREE.PointsMaterial({
  color: 0x7ff0c5, size: 0.025, transparent: true, opacity: 0.65,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const ring = new THREE.Points(ringGeo2, ringMat);
scene.add(ring);

// Dust motes
const dustCount = 600;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
  dustPos[i * 3] = (Math.random() - 0.5) * 16;
  dustPos[i * 3 + 1] = (Math.random() - 0.5) * 10;
  dustPos[i * 3 + 2] = (Math.random() - 0.5) * 16;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.PointsMaterial({
  color: 0x4466aa, size: 0.015, transparent: true, opacity: 0.35,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
scene.add(new THREE.Points(dustGeo, dustMat));

// ─── Lighting ───
const key = new THREE.DirectionalLight(0xffffff, 2.0);
key.position.set(4, 5, 6);
scene.add(key);
const rim = new THREE.DirectionalLight(0x6ce8ff, 1.4);
rim.position.set(-4, 2, -5);
scene.add(rim);
const bottom = new THREE.PointLight(0xff7bc1, 0.9, 10);
bottom.position.set(0, -4, 2);
scene.add(bottom);
const fill = new THREE.PointLight(0x7ff0c5, 0.5, 8);
fill.position.set(3, -1, -3);
scene.add(fill);
scene.add(new THREE.AmbientLight(0x1a2a44, 0.5));

// ─── Clock ───
const clock = new THREE.Clock();

// ─── MEMORY: localStorage persistence ───
const STORAGE_KEY = 'agi3d_entity';

const defaultTraits = { capability: 50, alignment: 50, resilience: 50, creativity: 50, risk: 20, sessions: 0, totalTime: 0 };

function loadEntity() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const d = JSON.parse(raw); return { ...defaultTraits, ...d }; }
  } catch {}
  return { ...defaultTraits };
}

function saveEntity() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(traits)); } catch {}
}

const traits = loadEntity();
traits.sessions++;
saveEntity();

// ─── INTERACTION STATE ───
let mouseNDC = { x: 0, y: 0 };
let mouseSpeed = 0;
let prevMouseX = 0, prevMouseY = 0;
let proximity = 0;          // 0 = far, 1 = touching
let clickRipple = 0;        // decays to 0
let lastInteraction = performance.now();
let idleFactor = 0;         // 0 = active, 1 = deep sleep
let dragMode = false;
let dragAngle = 0;
let camAutoOrbit = true;

// Interaction scoring (accumulated per frame)
let framePatience = 0;
let frameAggression = 0;
let frameCuriosity = 0;

canvas.addEventListener('pointermove', (e) => {
  const nx = (e.clientX / window.innerWidth) * 2 - 1;
  const ny = -(e.clientY / window.innerHeight) * 2 + 1;
  const dx = e.clientX - prevMouseX;
  const dy = e.clientY - prevMouseY;
  mouseSpeed = Math.sqrt(dx * dx + dy * dy);
  prevMouseX = e.clientX;
  prevMouseY = e.clientY;
  mouseNDC.x = nx;
  mouseNDC.y = ny;
  lastInteraction = performance.now();

  if (dragMode) {
    dragAngle += dx * 0.005;
    camAutoOrbit = false;
  }
});

canvas.addEventListener('pointerdown', (e) => {
  if (e.button === 0) {
    clickRipple = 1.0;
    lastInteraction = performance.now();
    frameAggression += 0.3;
  }
  if (e.button === 2 || e.pointerType === 'touch') {
    dragMode = true;
  }
});

canvas.addEventListener('pointerup', () => { dragMode = false; });
canvas.addEventListener('pointerleave', () => { dragMode = false; });
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

canvas.addEventListener('wheel', (e) => {
  const zoomDelta = e.deltaY * 0.002;
  camera.position.z = Math.max(2.5, Math.min(7, camera.position.z + zoomDelta));
  lastInteraction = performance.now();
  frameCuriosity += 0.15;
}, { passive: true });

// ─── LEARNING: trait evolution per frame ───
function learnFromBehavior(dt) {
  const rate = dt * 0.08;

  // Patience: watching without touching increases alignment
  const idleSeconds = (performance.now() - lastInteraction) / 1000;
  idleFactor = Math.min(1, idleSeconds / 30);
  if (idleSeconds > 3 && idleSeconds < 60) {
    framePatience += dt * 0.5;
  }

  // Apply accumulated scores
  traits.alignment = Math.min(100, traits.alignment + framePatience * rate * 0.6);
  traits.capability = Math.min(100, traits.capability + frameAggression * rate * 1.2);
  traits.risk = Math.min(100, Math.max(0, traits.risk + frameAggression * rate * 0.8 - framePatience * rate * 0.3));
  traits.creativity = Math.min(100, traits.creativity + frameCuriosity * rate * 0.9);
  traits.resilience = Math.min(100, traits.resilience + (1 - idleFactor) * rate * 0.2);

  // Decay scores
  framePatience *= 0.92;
  frameAggression *= 0.88;
  frameCuriosity *= 0.9;

  // Track total time
  traits.totalTime += dt;

  // Save every 5 seconds
  if (Math.floor(traits.totalTime) % 5 === 0) saveEntity();
}

// ─── INTERACTION → VISUALS ───
function applyInteractionToBreath(time) {
  // Proximity: how close is cursor to center?
  proximity = 1 - Math.min(1, Math.sqrt(mouseNDC.x * mouseNDC.x + mouseNDC.y * mouseNDC.y));

  // Click ripple decays
  clickRipple *= 0.94;
}

function interactionBreathModifiers() {
  // Extra wobble from proximity + speed
  const proximityWobble = proximity * 0.04;
  const speedWobble = Math.min(mouseSpeed * 0.0003, 0.05);
  const rippleWobble = clickRipple * 0.12;
  const sleepDampen = 1 - idleFactor * 0.6;

  return {
    extraAmplitude: (proximityWobble + speedWobble + rippleWobble) * sleepDampen,
    extraSpeed: proximity * 0.8 + clickRipple * 2.0,
    breathDampen: 1 - idleFactor * 0.4,
  };
}

function applyTraitsToMaterial() {
  const cap = traits.capability / 100;
  const align = traits.alignment / 100;
  const res = traits.resilience / 100;
  const cre = traits.creativity / 100;
  const risk = traits.risk / 100;

  // Size evolves with capability
  const scale = 0.9 + cap * 0.25;
  entity.scale.setScalar(scale);

  // Color: alignment = cyan, risk = red, creativity = purple shift
  const cr = 0.14 + risk * 0.5 + cre * 0.15;
  const cg = 0.65 + align * 0.25;
  const cb = 0.92 + cap * 0.08 - risk * 0.2;
  mat.color.setRGB(Math.min(cr, 1), Math.min(cg, 1), Math.min(cb, 1));

  mat.roughness = 0.22 - align * 0.16;
  mat.metalness = 0.72 + align * 0.18;
  mat.transmission = 0.05 + cre * 0.18;
  mat.clearcoat = 0.6 + res * 0.4;
  mat.emissive.setRGB(risk * 0.35, 0.05, 0.1 + cre * 0.1);
  mat.emissiveIntensity = 0.1 + risk * 0.4;
}

// Override breathe with interaction-aware version
const breatheWithInteraction = function(time) {
  const mods = interactionBreathModifiers();
  const pos = geo.attributes.position.array;
  const bc = Math.sin(time * 0.6) * 0.5 + 0.5;
  const bs = (0.97 + bc * 0.06) * mods.breathDampen;
  const pc = Math.sin(time * 2.2) * 0.5 + 0.5;
  const pa = (0.015 + pc * 0.025) + mods.extraAmplitude;
  const ent = Math.sin(time * 0.13) * 0.5 + 0.5;
  const ca = 0.02 + ent * 0.04 + mods.extraAmplitude * 0.5;
  const sp = 1 + mods.extraSpeed;

  for (let i = 0; i < pos.length; i += 3) {
    const bx = basePositions[i], by = basePositions[i + 1], bz = basePositions[i + 2];
    const len = Math.sqrt(bx * bx + by * by + bz * bz);
    const nx = bx / len, ny = by / len, nz = bz / len;
    let d = 0;
    d += Math.sin(nx * 3.0 + time * 0.5 * sp) * Math.cos(ny * 2.8 + time * 0.4 * sp) * Math.sin(nz * 2.5 + time * 0.35 * sp) * 0.06 * bs;
    d += Math.sin(nx * 5.5 + time * 2.0 * sp) * Math.cos(ny * 4.8 + time * 1.6 * sp) * pa;
    d += Math.sin(nx * 9.0 + time * 3.5 * sp + ny * 7.0) * Math.cos(nz * 8.0 + time * 2.8 * sp + nx * 6.0) * ca;
    d += ny * Math.sin(time * 0.3) * 0.02;
    // Click ripple: radial wave from front
    if (clickRipple > 0.01) {
      const wave = Math.sin(len * 12 - time * 8) * clickRipple * 0.08;
      d += wave;
    }
    pos[i] = bx * bs + nx * d;
    pos[i + 1] = by * bs + ny * d;
    pos[i + 2] = bz * bs + nz * d;
  }
  geo.attributes.position.needsUpdate = true;
  geo.computeVertexNormals();
  return { breathCycle: bc, pulseCycle: pc, entropy: ent };
};

function animateRing(time) {
  const pos = ring.geometry.attributes.position.array;
  for (let i = 0; i < ringCount; i++) {
    const a = (i / ringCount) * Math.PI * 2 + time * 0.08 * ringVel[i];
    const r = 1.8 + Math.sin(time * 0.5 + i * 0.1) * 0.15;
    pos[i * 3] = Math.cos(a) * r;
    pos[i * 3 + 1] = Math.sin(time * 0.7 + i * 0.05) * 0.08;
    pos[i * 3 + 2] = Math.sin(a) * r;
  }
  ring.geometry.attributes.position.needsUpdate = true;
  ring.rotation.y = time * 0.04;
}

// ─── Enhanced animate loop ───
function animateEnhanced() {
  requestAnimationFrame(animateEnhanced);
  const dt = clock.getDelta();
  const time = clock.getElapsedTime();

  applyInteractionToBreath(time);
  learnFromBehavior(dt);
  applyTraitsToMaterial();

  const breath = breatheWithInteraction(time);
  // Core glow
  coreMat.opacity = 0.06 + breath.breathCycle * 0.12 + breath.pulseCycle * 0.06 + clickRipple * 0.15;
  core.scale.setScalar(0.3 + breath.breathCycle * 0.12 + clickRipple * 0.2);

  animateRing(time);
  entity.rotation.y = time * 0.08;
  entity.rotation.x = Math.sin(time * 0.05) * 0.06;

  // Camera: auto orbit or drag
  let camAngle;
  if (camAutoOrbit) {
    camAngle = time * 0.03;
  } else {
    camAngle = dragAngle;
    // Slowly drift back to auto after 10s idle
    if ((performance.now() - lastInteraction) / 1000 > 10) camAutoOrbit = true;
  }
  const baseDist = camera.position.z || 4.2;
  const camR = baseDist + Math.sin(time * 0.15) * 0.2 * (1 - idleFactor * 0.8);
  camera.position.x = Math.sin(camAngle) * camR;
  camera.position.z = Math.cos(camAngle) * camR;
  camera.position.y = 0.3 + Math.sin(time * 0.12) * 0.25 * (1 - idleFactor * 0.7);
  camera.lookAt(0, 0, 0);

  // HUD
  hudPulse.textContent = breath.pulseCycle.toFixed(2);
  hudBreath.textContent = breath.breathCycle.toFixed(2);
  hudEntropy.textContent = breath.entropy.toFixed(2);

  renderer.render(scene, camera);
}

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Fullscreen on click ───
canvas.addEventListener('click', () => {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    document.documentElement.requestFullscreen().catch(() => {});
  }
});

document.addEventListener('fullscreenchange', () => {
  overlayEl.classList.toggle('faded', !!document.fullscreenElement);
  document.body.style.cursor = document.fullscreenElement ? 'none' : 'pointer';
});

// Save on exit
window.addEventListener('beforeunload', saveEntity);

animateEnhanced();
  </script>
